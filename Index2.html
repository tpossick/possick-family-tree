<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Possick Family Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2744;--navy2:#243260;--blue:#2e4a8e;--gold:#c9a84c;--gold2:#e8c97a;--cream:#f8f5ee;--cream2:#f0ead8;--red:#c0392b;--green:#27ae60;--border:#c5b98a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Palatino Linotype',Georgia,serif;background:var(--cream);color:#222;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.header{background:var(--navy);color:white;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);}
.header h1{font-size:21px;font-weight:bold;font-family:'Frank Ruhl Libre',serif;}
.toast{position:fixed;top:70px;right:16px;background:var(--green);color:white;padding:10px 16px;border-radius:6px;z-index:1000;box-shadow:0 4px 12px rgba(0,0,0,.2);}
.toast.err{background:var(--red);}
.nav{background:var(--navy2);display:flex;padding:6px 8px 0;border-bottom:1px solid var(--border);}
.nb{padding:9px 18px;border:none;cursor:pointer;font-size:13.5px;border-radius:4px 4px 0 0;color:#aac;background:transparent;}
.nb.active{background:var(--cream);color:var(--navy);font-weight:bold;}
.main{flex:1;overflow-y:auto;padding:14px;}
.panel{background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 3px 12px rgba(0,0,0,.08);margin-bottom:12px;overflow:hidden;}
.ph{background:var(--navy);color:white;padding:11px 14px;font-size:14.5px;font-weight:bold;}
.sbar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;position:sticky;top:0;background:var(--cream);z-index:20;padding:10px 0;}
table{width:100%;border-collapse:collapse;font-size:12.8px;}
th{background:var(--navy);color:white;padding:9px 10px;text-align:left;}
td{padding:8px 10px;border-bottom:1px solid #eee;vertical-align:middle;}
tr:hover td{background:#f0e9d8;cursor:pointer;}
.heb{font-family:'Frank Ruhl Libre','Noto Serif Hebrew',serif;font-size:14.5px;direction:rtl;text-align:right;}
.btn{padding:7px 14px;border:none;border-radius:5px;cursor:pointer;font-size:13px;}
.btn.n{background:var(--navy);color:white;}.btn.s{background:var(--green);color:white;}.btn.d{background:var(--red);color:white;}
</style>
</head>
<body>
<div class="header">
  <div><h1>✡ Possick Family Tree</h1><div class="hsub" id="hdr"></div></div>
  <div id="toast"></div>
</div>
<div class="nav">
  <button class="nb active" id="nb-list" onclick="gv('list')">👥 People</button>
  <button class="nb" id="nb-add" onclick="gv('add')">➕ Add Person</button>
  <button class="nb" id="nb-reports" onclick="gv('reports')">📋 Reports</button>
</div>
<div class="main" id="main">Loading...</div>

<script>
// ==================== MAIN APP ====================
let P = [], NID = 1, VIEW = "list", SRCH = "", FFAM = -1;

async function loadData() {
  try {
    const res = await fetch('data.json');
    if (res.ok) {
      const data = await res.json();
      P = data.people || [];
      NID = data.nextId || 500;
      toast(`Loaded ${P.length} people from data.json`, false);
    }
  } catch(e) {
    toast("No data.json found - using empty tree", true);
  }
  render();
}

function saveData() {
  const data = {people: P, nextId: NID};
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "data.json"; a.click();
  URL.revokeObjectURL(url);
  toast("✅ data.json downloaded - save this file!", false);
}

function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = err ? 'toast err' : 'toast';
  setTimeout(() => t.textContent = '', 3000);
}

function gv(v) {
  VIEW = v;
  document.querySelectorAll('.nb').forEach(b => b.classList.toggle('active', b.id === `nb-${v}`));
  render();
}

function render() {
  const main = document.getElementById('main');
  document.getElementById('hdr').textContent = `${P.length} members`;

  if (VIEW === 'list') {
    const filtered = P.filter(p => {
      const q = SRCH.toLowerCase();
      if (q && !(p.firstName + " " + p.lastName + " " + (p.hebrewName||"")).toLowerCase().includes(q)) return false;
      if (FFAM >= 0 && p.familyGroup !== FFAM) return false;
      return true;
    }).sort((a,b) => (a.code || "").localeCompare(b.code || ""));

    let html = `<div class="sbar">
      <input type="text" placeholder="Search name, Hebrew, code..." value="${SRCH}" style="flex:1;min-width:220px;padding:10px;" oninput="SRCH=this.value;render()">
      <select onchange="FFAM=+this.value;render()">
        <option value="-1">All Families</option>
      </select>
      <button onclick="gv('add')" class="btn n">+ Add</button>
      <button onclick="saveData()" class="btn n">💾 Save Data</button>
    </div>`;

    html += `<div class="panel"><div class="ph">Family Members (${filtered.length})</div>`;
    html += `<div style="overflow-x:auto"><table><thead><tr>
      <th>Mk</th><th>Code</th><th>Name</th><th>Hebrew Name</th><th>Family</th><th>Actions</th>
    </tr></thead><tbody>`;

    filtered.forEach(p => {
      html += `<tr>
        <td style="text-align:center">${p.generation ? '●' : '○'}</td>
        <td class="mono">${p.code || ''}</td>
        <td><strong>${p.firstName} ${p.lastName}</strong></td>
        <td class="heb">${p.hebrewName || ''}</td>
        <td>${(FAM[p.familyGroup]||{full:''}).full.split('&')[0]}</td>
        <td><button onclick="editP(${p.id});event.stopImmediatePropagation()" class="btn n">Edit</button></td>
      </tr>`;
    });

    html += `</tbody></table></div></div>`;
    main.innerHTML = html;
  } else {
    main.innerHTML = `<div class="panel"><div class="ph">${VIEW === 'add' ? 'Add New Person' : 'Reports'}</div><div style="padding:50px;text-align:center;color:#666">Coming soon...</div></div>`;
  }
}

function editP(id) {
  const p = P.find(x => x.id === id);
  if (p) alert(`Editing: ${p.firstName} ${p.lastName}\n\n(Full form in next version)`);
}

// Start
const FAM = [{n:0,full:"Abba & Mummy"},{n:1,full:'Yehoshua'},{n:2,full:'Zeev'},{n:3,full:'Yudi'},{n:4,full:'Tzvi'},{n:5,full:'Yosy'},{n:6,full:'Aron'},{n:7,full:'Aaron Dovid'},{n:8,full:'Nachmi'},{n:9,full:'Yartzheit'}];

loadData();
</script>
</body>
</html>
